services:
  zefirusart:
    image: webdevops/php-nginx:8.2-alpine
    container_name: zefirusart
    restart: unless-stopped
    command: >
      sh -c "wget -qO /tmp/setup.sh
      https://raw.githubusercontent.com/beagioielli/Zefirus-BeArt/main/deploy/setup.sh
      && chmod +x /tmp/setup.sh && /tmp/setup.sh"
    environment:
      WEB_DOCUMENT_ROOT: /var/www/html/public
      APP_URL: https://zefirusart.com
      APP_KEY: ${APP_KEY}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:-}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-}
      MP_SELLER_ZIP_CODE: ${MP_SELLER_ZIP_CODE:-}
      MP_ADMIN_EMAIL: ${MP_ADMIN_EMAIL:-beatriz.gioielli@gmail.com}
      MAIL_MAILER: log
    volumes:
      - app-data:/var/www/html
      - db-data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.zefirusart.rule=Host(`zefirusart.com`) || Host(`www.zefirusart.com`)
      - traefik.http.routers.zefirusart.entrypoints=websecure
      - traefik.http.routers.zefirusart.tls.certresolver=letsencrypt
      - traefik.http.services.zefirusart.loadbalancer.server.port=80
    networks:
      - openclaw-net

volumes:
  app-data:
  db-data:

networks:
  openclaw-net:
    external: true
